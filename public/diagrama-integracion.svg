<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" fill="none">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E6007E"/><stop offset="100%" stop-color="#ff4fb0"/></linearGradient>
    <linearGradient id="gC" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity=".06"/></filter>
  </defs>
  <style>text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }</style>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1c1622" letter-spacing="0.5">MODELOS DE INTEGRACIÓN POR NIVEL — PROYECTO INTEGRADOR</text>
  <line x1="180" y1="40" x2="720" y2="40" stroke="#E6007E" stroke-width="2" stroke-opacity="0.3"/>

  <!-- NIVEL 1: Data-First -->
  <text x="150" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">NIVEL I — DATA-FIRST</text>
  <!-- BD centro -->
  <rect x="100" y="85" width="100" height="60" rx="10" fill="url(#gA)" filter="url(#sh)"/>
  <text x="150" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="white">BASE DE</text>
  <text x="150" y="123" text-anchor="middle" font-size="9" font-weight="700" fill="white">DATOS</text>
  <text x="150" y="138" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">★ Líder</text>
  <!-- Flechas desde BD -->
  <path d="M150 145 L80 180" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arB)"/>
  <path d="M150 145 L220 180" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arB)"/>
  <defs><marker id="arB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#6366f1"/></marker></defs>
  <!-- Intro -->
  <rect x="30" y="185" width="100" height="50" rx="8" fill="white" filter="url(#sh)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="80" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#3a2f43">HTML / CSS</text>
  <text x="80" y="220" text-anchor="middle" font-size="7" fill="#6b7280">Capa Visual</text>
  <!-- Lógica -->
  <rect x="170" y="185" width="100" height="50" rx="8" fill="white" filter="url(#sh)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="220" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#3a2f43">Java Consola</text>
  <text x="220" y="220" text-anchor="middle" font-size="7" fill="#6b7280">Capa Lógica</text>
  <!-- Contrato -->
  <rect x="60" y="250" width="180" height="24" rx="12" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="150" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#6366f1">Contrato: Modelo Relacional</text>
  <!-- Flechas de contrato -->
  <path d="M80 249 L80 235" stroke="#6366f1" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <path d="M220 249 L220 235" stroke="#6366f1" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.5"/>

  <!-- NIVEL 2: Agile-First -->
  <text x="450" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#E6007E" letter-spacing="0.5">NIVEL II — AGILE-FIRST</text>
  <!-- Ágiles centro -->
  <rect x="400" y="85" width="100" height="60" rx="10" fill="url(#gB)" filter="url(#sh)"/>
  <text x="450" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="white">SCRUM</text>
  <text x="450" y="123" text-anchor="middle" font-size="9" font-weight="700" fill="white">MASTER</text>
  <text x="450" y="138" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">★ PMO</text>
  <!-- Flechas -->
  <path d="M450 145 L380 180" stroke="#E6007E" stroke-width="1.5" marker-end="url(#arM)"/>
  <path d="M450 145 L520 180" stroke="#E6007E" stroke-width="1.5" marker-end="url(#arM)"/>
  <defs><marker id="arM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#E6007E"/></marker></defs>
  <!-- Backend -->
  <rect x="330" y="185" width="100" height="50" rx="8" fill="white" filter="url(#sh)" stroke="#E6007E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="380" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#3a2f43">Java POO</text>
  <text x="380" y="220" text-anchor="middle" font-size="7" fill="#6b7280">Dev Team Back</text>
  <!-- Frontend -->
  <rect x="470" y="185" width="100" height="50" rx="8" fill="white" filter="url(#sh)" stroke="#E6007E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="520" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#3a2f43">JS + DOM</text>
  <text x="520" y="220" text-anchor="middle" font-size="7" fill="#6b7280">Dev Team Front</text>
  <!-- Desacoplamiento -->
  <line x1="435" y1="210" x2="465" y2="210" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="205" text-anchor="middle" font-size="6" fill="#ef4444" font-weight="700">✕</text>
  <rect x="360" y="250" width="180" height="24" rx="12" fill="#E6007E" fill-opacity="0.08" stroke="#E6007E" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="450" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#E6007E">Backlog + Sprints + Ceremonias</text>
  <path d="M380 249 L380 235" stroke="#E6007E" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.5"/>
  <path d="M520 249 L520 235" stroke="#E6007E" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.5"/>

  <!-- NIVEL 3: API-First -->
  <text x="750" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981" letter-spacing="0.5">NIVEL III — API-FIRST</text>
  <!-- Backend2 centro -->
  <rect x="700" y="85" width="100" height="60" rx="10" fill="url(#gC)" filter="url(#sh)"/>
  <text x="750" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="white">API REST</text>
  <text x="750" y="123" text-anchor="middle" font-size="9" font-weight="700" fill="white">Spring Boot</text>
  <text x="750" y="138" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">★ Arquitecto</text>
  <!-- Flechas -->
  <path d="M750 145 L680 180" stroke="#10b981" stroke-width="1.5" marker-end="url(#arG)"/>
  <path d="M750 145 L820 180" stroke="#10b981" stroke-width="1.5" marker-end="url(#arG)"/>
  <defs><marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#10b981"/></marker></defs>
  <!-- Frontend2 -->
  <rect x="630" y="185" width="100" height="50" rx="8" fill="white" filter="url(#sh)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="680" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#3a2f43">React SPA</text>
  <text x="680" y="220" text-anchor="middle" font-size="7" fill="#6b7280">Consumidor UI</text>
  <!-- NuevasTec -->
  <rect x="770" y="185" width="100" height="50" rx="8" fill="white" filter="url(#sh)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="820" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#3a2f43">Python</text>
  <text x="820" y="220" text-anchor="middle" font-size="7" fill="#6b7280">Analítica + DevOps</text>
  <!-- Conexión real -->
  <path d="M680 235 L680 250 L820 250 L820 235" stroke="#10b981" stroke-width="1.5" fill="none"/>
  <rect x="660" y="256" width="180" height="24" rx="12" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1"/>
  <text x="750" y="272" text-anchor="middle" font-size="8" font-weight="600" fill="#10b981">Integración Full-Stack + GitFlow</text>

  <!-- Leyenda -->
  <rect x="250" y="300" width="400" height="46" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="270" y="318" font-size="9" font-weight="700" fill="#6366f1">★</text><text x="282" y="318" font-size="8" fill="#3a2f43">Módulo líder</text>
  <text x="370" y="318" font-size="9" font-weight="700" fill="#E6007E">●</text><text x="382" y="318" font-size="8" fill="#3a2f43">Módulo de apoyo</text>
  <line x1="472" y1="312" x2="490" y2="312" stroke="#ef4444" stroke-width="2"/>
  <text x="498" y="318" font-size="8" fill="#3a2f43">Desacoplado</text>
  <path d="M574 312 L592 312" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="318" font-size="8" fill="#3a2f43">Integrado</text>
  <text x="270" y="338" font-size="7.5" fill="#9ca3af">Hitos sincronizados en semanas 6, 12 y 17 según planeadores FTCOCU-129</text>
</svg>
